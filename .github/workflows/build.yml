name: Build and Release Firmware

# Triggers:
#   - Every push to master         → build + unit tests, no release
#   - Every tag matching v*.*.*    → build + release (firmware.bin + ota.json)
#
# HISTORY:
#   v0.3.03  introduced a dual-build matrix (Arduino CLI + PlatformIO) with a
#            parity-check step to verify the two toolchains produced equivalent
#            binaries. That served its purpose — the two outputs were within
#            34 KB of each other on the v0.3.03 release.
#   v0.3.04  (this version) drops the Arduino CLI job and parity-check.
#            PlatformIO is now the canonical build. The pre-cutover workflow
#            is preserved on the `arduino-cli-legacy` tag for rollback.
#
# LAYOUT NOTE:
#   The project lives under esp32_node_firmware/ (not the repo root).
#   `defaults.run.working-directory` below makes every `run:` step execute
#   from that subfolder so paths like `src/`, `include/`, `platformio.ini`
#   resolve correctly. Action inputs (upload-artifact `path:`, download paths)
#   are relative to the checkout root, so those include the prefix explicitly.

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Node.js 20 is deprecated by GitHub Actions (hard cutoff June 2026).
# This flag forces all JavaScript actions to use the Node.js 24 runtime
# even on action versions that haven't published a Node 24 build yet.
# Remove once every action below ships a native Node 24 release.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: esp32_node_firmware

jobs:
  # ============================================================================
  # Secrets scan — trufflehog on every push (#63)
  # Catches accidentally-committed credentials, API keys, MQTT passwords,
  # gh-pages tokens. Runs against the diff (BASE..HEAD) for speed.
  # ============================================================================
  secrets-scan:
    name: Trufflehog secrets scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Trufflehog scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  # ============================================================================
  # PlatformIO build — canonical path from v0.3.04 onward
  # ============================================================================
  build:
    name: Compile with PlatformIO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # No cache: pip — we have no requirements.txt, so cache lookup fails the job.

      - name: Install PlatformIO
        # Pin click<8.2 — pioarduino 54.x uses an older click API that breaks
        # on click 8.2+ with "ParamType.get_metavar() missing 1 required
        # positional argument: 'ctx'" during the bootloader.bin build step.
        run: pip install --upgrade "platformio" "click<8.2"

      # Cache the PlatformIO home (platforms, toolchains, package archives) and
      # the per-project libdeps. The cache key includes platformio.ini so any
      # dependency pin change invalidates the cache cleanly.
      # First cold build on a fresh key: ~3.5 min.
      # Subsequent builds with cache hit:   ~45 s (platform + toolchain reused).
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            esp32_node_firmware/.pio/libdeps
          key: pio-${{ runner.os }}-${{ hashFiles('esp32_node_firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Extract firmware version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Run host unit tests
        run: pio test -e native -v

      - name: Build firmware
        env:
          FIRMWARE_VERSION: ${{ steps.version.outputs.version }}
        run: pio run -e esp32dev

      - name: Copy firmware.bin to workflow root
        # Place the artifact at esp32_node_firmware/firmware.bin so downstream
        # release steps can reference a stable path regardless of PlatformIO's
        # internal build output directory structure.
        run: cp .pio/build/esp32dev/firmware.bin firmware.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: esp32_node_firmware/firmware.bin
          retention-days: 30

  # ============================================================================
  # Variant builds — compile each non-release env so a refactor that only
  # exercises the default esp32dev path doesn't silently break minimal /
  # relay_hall builds. Uploads each variant binary as an artifact so the
  # release job can attach it to the GitHub Release alongside firmware.bin
  # (#104, 2026-04-30 — operator USB-flashing the relay_hall variant for
  # v0.5.0 wiring needs the binary off-host without a local build).
  # Tracking entry: SUGGESTED_IMPROVEMENTS #71 (compile gate) + #104
  # (artifact upload).
  # ============================================================================
  build-variants:
    name: Compile variant ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        env:
          - esp32dev_minimal
          - esp32dev_relay_hall
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PlatformIO
        run: pip install --upgrade "platformio" "click<8.2"
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
            esp32_node_firmware/.pio/libdeps
          key: pio-${{ runner.os }}-${{ hashFiles('esp32_node_firmware/platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-
      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}

      # (#104) Variant binary upload. Naming pattern firmware-<env>.bin
      # mirrors the canonical firmware.bin from the standard build so a
      # release page lists all binaries with discoverable names.
      # Matches the canonical build's cp pattern (line 129) — runs from
      # the default `esp32_node_firmware/` working directory.
      - name: Copy variant binary to a stable path
        run: cp .pio/build/${{ matrix.env }}/firmware.bin firmware-${{ matrix.env }}.bin

      - name: Upload variant firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: esp32_node_firmware/firmware-${{ matrix.env }}.bin
          retention-days: 30

  # ============================================================================
  # Release — tag builds only.
  # Publishes the PlatformIO-built firmware.bin as the canonical artifact,
  # attaches it to a GitHub Release, and updates ota.json on gh-pages.
  # Variant binaries (firmware-esp32dev_*.bin) are also attached for
  # operator-side USB flashing of feature-subset variants.
  # ============================================================================
  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: [build, build-variants]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware*
          merge-multiple: true
          path: .

      - name: Extract firmware version
        id: version
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Attach firmware binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware.bin
            firmware-esp32dev_minimal.bin
            firmware-esp32dev_relay_hall.bin
          name: "Firmware v${{ steps.version.outputs.version }}"
          body: |
            ## ESP32 Credential Bootstrap Firmware v${{ steps.version.outputs.version }}

            Built with PlatformIO (pioarduino 54.03.21 → arduino-esp32 3.1.1).

            ### Installation
            Flash via esptool or Arduino IDE. Pick the binary for your device's
            feature set:

            | Binary | Feature set |
            |---|---|
            | `firmware.bin` | Default (RFID + LED + ranging) — what OTA delivers |
            | `firmware-esp32dev_minimal.bin` | RFID disabled (smaller flash footprint) |
            | `firmware-esp32dev_relay_hall.bin` | + 2-channel relay + Hall sensor (v0.5.0 hardware) |

            ```
            esptool.py --chip esp32 --baud 921600 write_flash 0x10000 firmware.bin
            ```

            ### OTA
            Nodes running v1.0.0 or later will automatically detect and apply this
            update within one OTA check interval (default: 1 hour), or immediately
            when triggered via MQTT `cmd/ota_check`. OTA always delivers the
            standard `firmware.bin`; variant binaries require USB flashing
            (per-device variant routing planned post-v0.5.0).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish firmware.bin + ota.json to GitHub Pages
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="$(echo '${{ github.repository }}' | cut -d/ -f2)"
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp firmware.bin /tmp/firmware.bin
          rm firmware.bin

          git fetch origin gh-pages 2>/dev/null || true
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          cat > ota.json <<EOF
          {
            "Configurations": [
              {
                "Version": "${VERSION}",
                "URL": "${PAGES_URL}/firmware.bin"
              }
            ]
          }
          EOF

          cp /tmp/firmware.bin firmware.bin

          git add ota.json firmware.bin
          git commit -m "release: firmware v${VERSION} OTA assets"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
