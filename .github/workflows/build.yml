name: Build and Release Firmware

# Triggers:
#   - Every push to master (build only, no release)
#   - Every tag matching v*.*.* (build + attach firmware.bin to GitHub Release)
on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Compile ESP32 Firmware
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Arduino CLI ───────────────────────────────────────────────
      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      # ── 3. Configure Arduino CLI ─────────────────────────────────────────────
      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      # ── 4. Install ESP32 board package ───────────────────────────────────────
      - name: Install ESP32 board package
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.1.1

      # ── 5. Install libraries ──────────────────────────────────────────────────
      # AsyncMqttClient requires AsyncTCP as a dependency.
      - name: Install Arduino libraries
        run: |
          arduino-cli lib install "ArduinoJson@7"
          # AsyncMqttClient, AsyncTCP, and ESP32-OTA-Pull are installed from GitHub (not in registry)
          mkdir -p ~/Arduino/libraries
          git clone --depth 1 https://github.com/marvinroger/async-mqtt-client.git \
            ~/Arduino/libraries/AsyncMqttClient
          git clone --depth 1 https://github.com/me-no-dev/AsyncTCP.git \
            ~/Arduino/libraries/AsyncTCP
          git clone --depth 1 https://github.com/mikalhart/ESP32-OTA-Pull.git \
            ~/Arduino/libraries/ESP32OTAPull

      # ── 6. Extract version from tag (if this is a release build) ─────────────
      - name: Extract firmware version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      # ── 7. Patch FIRMWARE_VERSION in config.h ────────────────────────────────
      # Ensures the compiled binary reports the same version as the git tag.
      - name: Patch firmware version in config.h
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TIMESTAMP=$(date +%s)
          sed -i "s|#define FIRMWARE_VERSION.*|#define FIRMWARE_VERSION           \"${VERSION}\"|" \
            esp32_firmware/esp32_firmware/config.h
          sed -i "s|#define FIRMWARE_BUILD_TIMESTAMP.*|#define FIRMWARE_BUILD_TIMESTAMP   ${TIMESTAMP}ULL|" \
            esp32_firmware/esp32_firmware/config.h
          echo "Patched config.h:"
          grep -E "FIRMWARE_VERSION|FIRMWARE_BUILD_TIMESTAMP" esp32_firmware/esp32_firmware/config.h

      # ── 8. Compile sketch ────────────────────────────────────────────────────
      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            --warnings default \
            esp32_firmware/esp32_firmware

      # ── 9. Rename output binary ──────────────────────────────────────────────
      - name: Rename binary
        run: |
          cp ./build/esp32_firmware.ino.bin ./firmware.bin
          echo "Binary size: $(wc -c < firmware.bin) bytes"

      # ── 10. Upload artifact (every build) ───────────────────────────────────
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: firmware.bin
          retention-days: 30

      # ── 11. Attach to GitHub Release (tag builds only) ───────────────────────
      - name: Attach firmware.bin to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware.bin
          name: "Firmware v${{ steps.version.outputs.version }}"
          body: |
            ## ESP32 Credential Bootstrap Firmware v${{ steps.version.outputs.version }}

            ### Installation
            Flash via Arduino IDE or esptool:
            ```
            esptool.py --chip esp32 --baud 921600 write_flash 0x10000 firmware.bin
            ```

            ### OTA
            Nodes running v1.0.0 or later will automatically detect and apply this
            update within one OTA check interval (default: 1 hour), or immediately
            when triggered via MQTT `cmd/ota_check`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Publish firmware.bin + ota.json to GitHub Pages ─────────────────
      # GitHub Pages serves files directly (no redirect), so ESP32-OTA-Pull can
      # download the binary without hitting the 302 that GitHub Release URLs return.
      - name: Publish to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="$(echo '${{ github.repository }}' | cut -d/ -f2)"
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Restore config.h — it was patched in-place by step 7 but never committed.
          # The binary is already compiled; leaving it dirty would block the branch switch.
          git checkout -- esp32_firmware/esp32_firmware/config.h

          # Check out gh-pages (create orphan branch if it doesn't exist yet)
          git fetch origin gh-pages 2>/dev/null || true
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          # Write ota.json pointing to the Pages-hosted binary (no redirect)
          cat > ota.json <<EOF
          {
            "Configurations": [
              {
                "Version": "${VERSION}",
                "URL": "${PAGES_URL}/firmware.bin"
              }
            ]
          }
          EOF

          # Copy the freshly built binary into the Pages tree
          cp "$GITHUB_WORKSPACE/firmware.bin" firmware.bin

          git add ota.json firmware.bin
          git commit -m "release: firmware v${VERSION} OTA assets"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
