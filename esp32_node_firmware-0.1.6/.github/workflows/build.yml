name: Build and Release Firmware

# Triggers:
#   - Every push to master (build only, no release)
#   - Every tag matching v*.*.* (build + PIO/Arduino parity check + attach
#     firmware.bin to GitHub Release + publish ota.json to Pages)
#
# From v0.3.03 this workflow runs TWO builds in parallel:
#   - build-arduino-cli  (legacy path, retained for one release as a safety net)
#   - build-platformio   (new path, becomes the default in v0.3.04)
# The parity-check job compares their firmware.bin sizes on tag builds and fails
# if they differ by more than 2 KB, catching toolchain drift early.
#
# At v0.3.04 the arduino-cli job and parity-check are deleted; the PlatformIO
# output becomes the canonical firmware.bin.

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  # ============================================================================
  # PlatformIO build — new canonical path
  # ============================================================================
  build-platformio:
    name: Compile with PlatformIO
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Extract firmware version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Run host unit tests
        run: pio test -e native -v

      - name: Build firmware
        env:
          FIRMWARE_VERSION: ${{ steps.version.outputs.version }}
        run: pio run -e esp32dev

      - name: Rename firmware.bin for artifact upload
        run: cp .pio/build/esp32dev/firmware.bin firmware-pio.bin

      - name: Upload PIO artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-pio
          path: firmware-pio.bin
          retention-days: 30

  # ============================================================================
  # Arduino CLI build — legacy path, retained for parity check in v0.3.03.
  # Deleted at v0.3.04.
  # ============================================================================
  build-arduino-cli:
    name: Compile with Arduino CLI (legacy)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Configure Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 board package
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.1.1

      - name: Install Arduino libraries
        run: |
          arduino-cli lib install "ArduinoJson@7" "MFRC522v2" "NimBLE-Arduino"
          mkdir -p ~/Arduino/libraries
          git clone --depth 1 https://github.com/marvinroger/async-mqtt-client.git \
            ~/Arduino/libraries/AsyncMqttClient
          git clone --depth 1 https://github.com/me-no-dev/AsyncTCP.git \
            ~/Arduino/libraries/AsyncTCP
          git clone --depth 1 https://github.com/mikalhart/ESP32-OTA-Pull.git \
            ~/Arduino/libraries/ESP32OTAPull

      - name: Extract firmware version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # Assemble the Arduino IDE layout from the PlatformIO src/ + include/ tree.
      # Arduino CLI expects: <folder>/<folder>.ino plus all headers in the same folder.
      # This step synthesises that layout at build time from the source of truth
      # (src/main.cpp + include/*.h). Deleted at v0.3.04 together with this job.
      - name: Assemble Arduino IDE layout from PIO sources
        run: |
          mkdir -p esp32_firmware/esp32_firmware
          cp src/main.cpp esp32_firmware/esp32_firmware/esp32_firmware.ino
          cp include/*.h esp32_firmware/esp32_firmware/

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            --warnings default \
            --build-property "build.extra_flags=-DFIRMWARE_VERSION_OVERRIDE=\"${{ steps.version.outputs.version }}\"" \
            esp32_firmware/esp32_firmware

      - name: Rename output binary
        run: |
          cp ./build/esp32_firmware.ino.bin ./firmware.bin
          echo "Arduino CLI binary size: $(wc -c < firmware.bin) bytes"

      - name: Upload Arduino CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-acli
          path: firmware.bin
          retention-days: 30

  # ============================================================================
  # Parity check — only on tag builds. Compares the two firmware.bin sizes.
  # Deleted at v0.3.04 together with build-arduino-cli.
  # ============================================================================
  parity-check:
    name: Arduino CLI vs PlatformIO binary parity
    runs-on: ubuntu-latest
    needs: [build-arduino-cli, build-platformio]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download both binaries
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Compare sizes
        run: |
          ACLI=$(stat -c%s ./artifacts/firmware-acli/firmware.bin)
          PIO=$(stat -c%s ./artifacts/firmware-pio/firmware-pio.bin)
          DIFF=$(( ACLI > PIO ? ACLI - PIO : PIO - ACLI ))
          echo "arduino-cli: ${ACLI} bytes"
          echo "platformio : ${PIO} bytes"
          echo "difference : ${DIFF} bytes"
          # Allow up to 4 KB drift (compiler rev / flag / library pinning differences)
          if [ "${DIFF}" -gt 4096 ]; then
            echo "::error::Binary size drift exceeds 4 KB — investigate before v0.3.04 cutover"
            exit 1
          fi
          echo "Parity check passed"

  # ============================================================================
  # Release — tag builds only. Uses the Arduino CLI binary as the canonical
  # firmware.bin for v0.3.03 (safe fallback). Switches to PlatformIO at v0.3.04.
  # ============================================================================
  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: [parity-check]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Arduino CLI firmware
        uses: actions/download-artifact@v4
        with:
          name: firmware-acli
          path: .

      - name: Extract firmware version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Attach firmware.bin to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware.bin
          name: "Firmware v${{ steps.version.outputs.version }}"
          body: |
            ## ESP32 Credential Bootstrap Firmware v${{ steps.version.outputs.version }}

            Built with Arduino CLI (canonical) and verified against PlatformIO build.
            From v0.3.04 the PlatformIO build becomes the canonical artifact.

            ### Installation
            Flash via Arduino IDE or esptool:
            ```
            esptool.py --chip esp32 --baud 921600 write_flash 0x10000 firmware.bin
            ```

            ### OTA
            Nodes running v1.0.0 or later will automatically detect and apply this
            update within one OTA check interval (default: 1 hour), or immediately
            when triggered via MQTT `cmd/ota_check`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish firmware.bin + ota.json to GitHub Pages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="$(echo '${{ github.repository }}' | cut -d/ -f2)"
          PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp firmware.bin /tmp/firmware.bin
          rm firmware.bin

          git fetch origin gh-pages 2>/dev/null || true
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

          cat > ota.json <<EOF
          {
            "Configurations": [
              {
                "Version": "${VERSION}",
                "URL": "${PAGES_URL}/firmware.bin"
              }
            ]
          }
          EOF

          cp /tmp/firmware.bin firmware.bin

          git add ota.json firmware.bin
          git commit -m "release: firmware v${VERSION} OTA assets"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
