; =============================================================================
; platformio.ini  —  ESP32 Credential Bootstrap Firmware
;
; Introduced in v0.3.03 as part of the Arduino IDE → VS Code + PlatformIO
; migration. During v0.3.03 the repo is DUAL-BUILD: both Arduino CLI and
; PlatformIO builds must pass in CI (see .github/workflows/build.yml).
; At v0.3.04 the Arduino CLI path is removed.
;
; LOCAL USAGE
;   Build firmware:          pio run
;   Upload to COM5:          pio run -t upload
;   Serial monitor:          pio device monitor
;   Run host unit tests:     pio test -e native
;
; DEPENDENCY PINS
;   platform = espressif32 @ 6.9.0  ships Arduino-ESP32 core 3.1.1, which is
;   what the existing Arduino CLI workflow installs. Holding that version
;   prevents accidental core drift from changing runtime behaviour on-device.
; =============================================================================

[platformio]
default_envs = esp32dev

; ── Device environment — compiles for ESP32 (Xtensa LX6) target ───────────────
[env:esp32dev]
platform        = espressif32@6.9.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_port    = COM5
upload_port     = COM5
upload_speed    = 921600

; Partition scheme: matches the Arduino CLI build
; (min_spiffs gives 1.9 MB app partitions for OTA)
board_build.partitions = min_spiffs.csv

; FIRMWARE_VERSION_OVERRIDE is injected from the CI env at build time.
; If unset (local dev), config.h falls back to the literal "0.3.03-dev".
build_flags     =
    -Wall
    -Wextra
    -DFIRMWARE_VERSION_OVERRIDE=\"${sysenv.FIRMWARE_VERSION}\"

lib_deps        =
    bblanchon/ArduinoJson @ ^7.0.0
    fastled/FastLED @ ^3.6.0
    ; MFRC522v2 registry entries (GithubCommunity/, OSSLibraries/) are unstable —
    ; install from the canonical GitHub repo to pin behaviour.
    https://github.com/OSSLibraries/Arduino_MFRC522v2.git
    https://github.com/marvinroger/async-mqtt-client.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/mikalhart/ESP32-OTA-Pull.git
    ; NimBLE-Arduino is intentionally NOT listed — it is bundled with
    ; arduino-esp32 3.x (the framework shipped by espressif32@6.9.0).
    ; Adding it explicitly causes a duplicate-symbol link conflict.

; ── Native environment — host-side unit tests, no hardware required ───────────
; Compiles test/test_native/test_main.cpp against the pure utility headers in
; include/ (ranging_math.h, mac_utils.h, peer_tracker.h). Runs on the CI
; runner or the developer's laptop — no ESP32 needed.
[env:native]
platform        = native
build_flags     =
    -std=c++14
    -Iinclude
; Only build the test sources, not the firmware main.cpp (which needs Arduino).
test_build_src  = no
