; =============================================================================
; platformio.ini  —  ESP32 Credential Bootstrap Firmware
;
; Introduced in v0.3.03 as part of the Arduino IDE → VS Code + PlatformIO
; migration. During v0.3.03 the repo is DUAL-BUILD: both Arduino CLI and
; PlatformIO builds must pass in CI (see .github/workflows/build.yml).
; At v0.3.04 the Arduino CLI path is removed.
;
; LOCAL USAGE
;   Build firmware:          pio run
;   Upload to COM5:          pio run -t upload
;   Serial monitor:          pio device monitor
;   Run host unit tests:     pio test -e native
;
; DEPENDENCY PINS
;   platform = espressif32 @ 6.9.0  ships Arduino-ESP32 core 3.1.1, which is
;   what the existing Arduino CLI workflow installs. Holding that version
;   prevents accidental core drift from changing runtime behaviour on-device.
; =============================================================================

[platformio]
default_envs = esp32dev

; ── Device environment — compiles for ESP32 (Xtensa LX6) target ───────────────
; Platform: pioarduino (community fork that tracks arduino-esp32 3.x).
;   The official platform-espressif32 package only reached arduino-esp32 2.0.x
;   (espressif32@6.x ships 2.0.17). pioarduino 54.03.21 ships arduino-esp32
;   3.1.1 — the version the Arduino CLI job installs and that the existing
;   source code targets (uses esp_now_recv_info_t, MBEDTLS_PRIVATE macros,
;   etc. — APIs only present in 3.x).
[env:esp32dev]
platform        = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_port    = COM5
upload_port     = COM5
upload_speed    = 921600

; Partition scheme: matches the Arduino CLI build
; (min_spiffs gives 1.9 MB app partitions for OTA)
board_build.partitions = min_spiffs.csv

; FIRMWARE_VERSION_OVERRIDE is injected from the CI env at build time.
; If unset (local dev), config.h falls back to the literal "0.3.03-dev".
build_flags     =
    -Wall
    -Wextra
    -DFIRMWARE_VERSION_OVERRIDE=\"${sysenv.FIRMWARE_VERSION}\"

; NOTE on pinning:
;   Registry deps use the narrowest SemVer range that's known to build:
;     - ^2.0.0 permits any 2.x but NOT 3.x (blocks NimBLE major API breakage).
;       ~2.0.0 would be tighter (2.0.x only) but the PlatformIO registry does
;       not index 2.0.x as the latest 2.x entry, so ~2.0.0 fails to resolve.
;       ^2.0.0 is the correct bound. The ble.h build guard (#error on <2) catches
;       any accidental downgrade at compile time regardless of the range used here.
;   GitHub deps are pinned to an exact commit SHA via PlatformIO's `#<ref>`
;   syntax. An upstream force-push or API change cannot silently break the
;   build — if a pinned SHA disappears we get a hard fetch failure instead.
;   Refresh the pins deliberately on every release bump.
lib_deps        =
    bblanchon/ArduinoJson @ ^7.0.0
    fastled/FastLED @ ^3.6.0
    h2zero/NimBLE-Arduino @ ^2.0.0
    ; MFRC522v2 registry entry name varies across repos — install from the
    ; canonical GitHub repo and pin to commit SHA for reproducibility.
    https://github.com/OSSLibraries/Arduino_MFRC522v2.git#f8b1eeef77176dfa064efea466bed13919dc5efc
    https://github.com/marvinroger/async-mqtt-client.git#3d93fc7f662e65366f8e2b0d88b108f874f035b9
    https://github.com/me-no-dev/AsyncTCP.git#ef448a8a1dffe4ec1b72326dd5a26211ff227b49
    https://github.com/mikalhart/ESP32-OTA-Pull.git#v1.0.2

; ── Native environment — host-side unit tests, no hardware required ───────────
; Compiles test/test_native/test_main.cpp against the pure utility headers in
; include/ (ranging_math.h, mac_utils.h, peer_tracker.h). Runs on the CI
; runner or the developer's laptop — no ESP32 needed.
[env:native]
platform        = native
build_flags     =
    -std=c++14
    -Iinclude
; Only build the test sources, not the firmware main.cpp (which needs Arduino).
test_build_src  = no
