; =============================================================================
; platformio.ini  —  ESP32 Credential Bootstrap Firmware
;
; Introduced in v0.3.03 as part of the Arduino IDE → VS Code + PlatformIO
; migration. During v0.3.03 the repo is DUAL-BUILD: both Arduino CLI and
; PlatformIO builds must pass in CI (see .github/workflows/build.yml).
; At v0.3.04 the Arduino CLI path is removed.
;
; LOCAL USAGE
;   Build firmware:          pio run
;   Upload to COM5:          pio run -t upload
;   Serial monitor:          pio device monitor
;   Run host unit tests:     pio test -e native
;
; DEPENDENCY PINS
;   platform = espressif32 @ 6.9.0  ships Arduino-ESP32 core 3.1.1, which is
;   what the existing Arduino CLI workflow installs. Holding that version
;   prevents accidental core drift from changing runtime behaviour on-device.
; =============================================================================

[platformio]
default_envs = esp32dev

; ── Device environment — compiles for ESP32 (Xtensa LX6) target ───────────────
; Platform: pioarduino (community fork that tracks arduino-esp32 3.x).
;   The official platform-espressif32 package only reached arduino-esp32 2.0.x
;   (espressif32@6.x ships 2.0.17). pioarduino 55.03.38-1 ships arduino-esp32
;   3.1.x — the version the Arduino CLI job installs and that the existing
;   source code targets (uses esp_now_recv_info_t, MBEDTLS_PRIVATE macros,
;   etc. — APIs only present in 3.x).
;   Note: 54.03.21 lacked package.json required by PlatformIO 6.x+; 55.x adds it.
[env:esp32dev]
platform        = https://github.com/pioarduino/platform-espressif32.git#55.03.38-1
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
monitor_port    = COM5
upload_port     = COM5
upload_speed    = 921600

; Partition scheme: matches the Arduino CLI build
; (min_spiffs gives 1.9 MB app partitions for OTA)
board_build.partitions = min_spiffs.csv

; (v0.4.14 attempt rolled back) esphome/AsyncTCP v2.0.1 hits
; "tcp_alloc: Required to lock TCPIP core functionality" assert in
; arduino-esp32 3.3.8's lwIP — incompatible with current LWIP_TCPIP_CORE_LOCKING.
; Reverted to me-no-dev/AsyncTCP. The use-after-free (tcp_arg LoadStoreAlignment)
; remains; chaos-test guard rails in tools/chaos/ + heap-guard in mqttPublish are
; the mitigations until a compatible fork is identified.
; mathieucarbou/AsyncTCP @ v3.3.2 vs the AsyncTCP transitive dep from
; AsyncMqttClient. PlatformIO links both unless we ignore the legacy one.
; "AsyncTCP" matches the me-no-dev transitive; mathieucarbou's library
; folder is named "AsyncTCP" too — but the explicit lib_deps URL takes
; precedence so the transitive is dropped automatically. If multiple-def
; link errors return, set:  lib_ignore = AsyncTCP@src-ef448a8a...

; (Phase 4 / v0.4.0 — BLOCKED by pioarduino bug, see SUGGESTED_IMPROVEMENTS #25)
; CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=y would make freshly-OTA'd partitions
; enter PENDING_VERIFY state so the bootloader auto-reverts on a boot loop.
; Tested on 2026-04-23 — pioarduino's custom_sdkconfig framework rebuild
; loses arduino-esp32's __wrap_log_printf symbol (used by NetworkClientSecure).
; -Wl,--wrap=log_printf in build_flags doesn't help because the wrap TARGET
; itself is missing from the rebuilt framework, not just the wrap directive.
; Needs deeper pioarduino-internals investigation; deferred. The runtime
; NVS-flag validation (Phase 2) covers ~95% of the safety net.
;
; To re-enable once the upstream issue is resolved: uncomment below.
; Requires the local min_spiffs.csv (next to this file) because pioarduino's
; custom_sdkconfig flow looks up the partition table at the project root,
; not in the framework variants/ directory.
;
; custom_sdkconfig =
;     CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=y

; v0.3.20: Extend iram0_0_seg by 2 KB to fit the esp_sleep driver (IRAM_ATTR
; required for cmd/sleep + cmd/deep_sleep). The custom ld/memory.ld is
; injected BEFORE the framework's copy via modify_link_path.py. The 2 KB
; is taken from SRAM1 (dual-port; heap automatically adjusts via _sram1_iram_len).
extra_scripts = pre:modify_link_path.py

; FIRMWARE_VERSION_OVERRIDE is injected by modify_link_path.py at pre-link
; ONLY when the FIRMWARE_VERSION env var is set and non-empty. Local builds
; without that env var (developer workstations) fall through to config.h's
; fallback literal. This prevents the SUGGESTED_IMPROVEMENTS #43 bug where
; an empty env var would expand to `-DFIRMWARE_VERSION_OVERRIDE=""`, which
; defeats the #ifdef in config.h.
build_flags     =
    -Wall
    -Wextra
    -DARDUINO_LOOP_STACK_SIZE=16384

; NOTE on pinning:
;   Registry deps use the narrowest SemVer range that's known to build:
;     - ^2.0.0 permits any 2.x but NOT 3.x (blocks NimBLE major API breakage).
;       ~2.0.0 would be tighter (2.0.x only) but the PlatformIO registry does
;       not index 2.0.x as the latest 2.x entry, so ~2.0.0 fails to resolve.
;       ^2.0.0 is the correct bound. The ble.h build guard (#error on <2) catches
;       any accidental downgrade at compile time regardless of the range used here.
;   GitHub deps are pinned to an exact commit SHA via PlatformIO's `#<ref>`
;   syntax. An upstream force-push or API change cannot silently break the
;   build — if a pinned SHA disappears we get a hard fetch failure instead.
;   Refresh the pins deliberately on every release bump.
lib_deps        =
    bblanchon/ArduinoJson @ ^7.0.0
    fastled/FastLED @ ^3.6.0
    h2zero/NimBLE-Arduino @ ^2.0.0
    ; MFRC522v2 registry entry name varies across repos — install from the
    ; canonical GitHub repo and pin to commit SHA for reproducibility.
    https://github.com/OSSLibraries/Arduino_MFRC522v2.git#f8b1eeef77176dfa064efea466bed13919dc5efc
    https://github.com/marvinroger/async-mqtt-client.git#3d93fc7f662e65366f8e2b0d88b108f874f035b9
    ; (v0.4.14 attempt 2, 2026-04-27) mathieucarbou/AsyncTCP v3.3.2 — actively
    ; maintained fork used by ESP-Async-WebServer. Handles LWIP_TCPIP_CORE_LOCKING
    ; correctly via internal lwip_tcpip_lock helpers. IPv6Address.h is conditional
    ; on ESP_IDF_VERSION_MAJOR < 5 — arduino-esp32 3.3.8 is on IDF 5.x so the dep
    ; is skipped. Replaces me-no-dev/AsyncTCP whose tcp_arg use-after-free
    ; (CHAOS_TESTING.md M2) caused the v0.4.10 #51 and 2026-04-27 10:42 cascades.
    https://github.com/mathieucarbou/AsyncTCP.git#v3.3.2
    https://github.com/mikalhart/ESP32-OTA-Pull.git#v1.0.2

; ── BLE coexistence bench environment (Path C Phase 1, 2026-04-27) ───────────
; Inherits from esp32dev. Adds:
;   -DBLE_ENABLED            Re-enables NimBLE scanner (currently off in stock config.h)
;   -DLOG_LEVEL_DEBUG        Verbose logging for coexistence diagnosis
;   -DBLE_BENCH_RIG          Marker constant — `ble.h` and `main.cpp` may key
;                            off this to switch scan duty / pin tasks for the bench
; Only flash to the Path C bench device (Bravo as of 2026-04-27). The fleet
; stays on stock esp32dev. Build:  pio run -e esp32dev_ble_bench -t upload --upload-port COM4
[env:esp32dev_ble_bench]
extends         = env:esp32dev
build_flags     =
    ${env:esp32dev.build_flags}
    -DBLE_ENABLED
    -DLOG_LEVEL_DEBUG
    -DBLE_BENCH_RIG

; ── Minimal variant build (#71, 2026-04-27) ─────────────────────────────────
; First cut at #71's per-device feature-subset story. Inherits from esp32dev,
; turns off RFID via -URFID_ENABLED. BLE is already off in stock config.h.
; ESP-NOW ranging stays on because bootstrap depends on it — a true "minimal"
; variant would also need a new ESPNOW_RANGING_ENABLED guard, deferred until
; the variant infrastructure proves itself.
;
; Flash to a node that has no RFID hardware (Alpha/Bravo/Charlie/Delta/Echo
; — not Foxtrot) for flash savings + lower attack surface. Validate the
; bootstrap + heartbeat flow before adding more variants.
;
; Build: pio run -e esp32dev_minimal
; Flash: pio run -e esp32dev_minimal -t upload --upload-port COMx
[env:esp32dev_minimal]
extends         = env:esp32dev
build_flags     =
    ${env:esp32dev.build_flags}
    -DRFID_DISABLED

; ── Stack-canary build (#54, v0.4.19) ────────────────────────────────────────
; Inherits from esp32dev. Enables FreeRTOS' built-in stack-overflow check at
; canary level: a magic byte pattern is written to each task's stack on create,
; and verified on every context switch. If a task overflows its stack, the
; check panics IMMEDIATELY at the offending task instead of corrupting memory
; silently and crashing later in unrelated code.
;
; Use for soak runs of one device when investigating mysterious panics or
; before promoting code that grows stack usage (mbedTLS keygen, OTA chunks,
; AsyncTCP queue handlers). NOT enabled by default because the per-context-
; switch check costs ~few µs and we don't need it under normal operation.
;
; Promote to default by bumping CONFIG_FREERTOS_CHECK_STACKOVERFLOW=2 in
; sdkconfig.defaults if a week of canary-build soak surfaces no false positives.
;
; Build: PATH=/c/mingw64/bin:$PATH pio run -e esp32dev_canary
[env:esp32dev_canary]
extends         = env:esp32dev
build_flags     =
    ${env:esp32dev.build_flags}
    -DCONFIG_FREERTOS_CHECK_STACKOVERFLOW_CANARY
    -DLOG_LEVEL_DEBUG
    -DOTA_DISABLE

; ── Native environment — host-side unit tests, no hardware required ───────────
; Compiles test/test_native/test_main.cpp against the pure utility headers in
; include/ (ranging_math.h, mac_utils.h, peer_tracker.h). Runs on the CI
; runner or the developer's laptop — no ESP32 needed.
[env:native]
platform        = native
build_flags     =
    -std=c++14
    -Iinclude
; Only build the test sources, not the firmware main.cpp (which needs Arduino).
test_build_src  = no
